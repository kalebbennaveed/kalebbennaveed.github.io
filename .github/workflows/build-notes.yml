name: Build Notes

on:
  push:
    branches:
      - main
    paths:
      - 'notes_src/**'

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install HonKit
        run: npm install -g honkit

      - name: Build Notes
        run: honkit build notes_src/ notes/

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: build honkit notes [skip ci]"
          file_pattern: 'notes/**'
