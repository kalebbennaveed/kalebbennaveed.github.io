name: Build Notes

on:
  push:
    branches:
      - main
    paths:
      - 'notes_src/**'

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Jupyter Book
        run: pip install "jupyter-book<1.0"

      - name: Build Notes
        run: jupyter-book build notes_src/

      - name: Update notes folder
        run: |
          rm -rf notes
          mv notes_src/_build/html notes

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: build jupyter-book notes [skip ci]"
          file_pattern: 'notes/**'
